name: scorecard

# Nightly recap: which alerted bets resolved (HIT/MISS) and net realized PnL.
on:
  schedule:
    # 06:00 UTC = 11:00pm America/Phoenix (MST, UTC-7). Phoenix has no daylight
    # saving, so this stays at 11pm local year-round.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: polysignal-state
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scorecard:
    runs-on: ubuntu-latest
    env:
      POLYSIGNAL_SLACK_WEBHOOK_URL: ${{ secrets.POLYSIGNAL_SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: polysignal.db
          key: polysignal-db-${{ github.run_id }}
          restore-keys: |
            polysignal-db-

      - name: Score resolved signals
        run: python -m polysignal.scorecard

      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: polysignal.db
          key: polysignal-db-${{ github.run_id }}-${{ github.run_attempt }}
